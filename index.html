<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>French Essentials Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f4ef;
      --surface: #ffffff;
      --accent: #3d2fa0;
      --accent-light: #ece9fc;
      --text: #1a1a2e;
      --muted: #6b6880;
      --border: #e2ddd8;
      --correct-bg: #eaf3de;
      --correct-text: #27500a;
      --correct-border: #639922;
      --wrong-bg: #fcebeb;
      --wrong-text: #501313;
      --wrong-border: #e24b4a;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header .flag { font-size: 2.5rem; margin-bottom: 0.5rem; display: block; }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.4rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 660px;
    }

    /* ── Start Screen ── */
    #start-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 500;
      margin-bottom: 0.35rem;
    }

    #start-screen > p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .filter-label {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      padding: 5px 13px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.8rem;
    }

    .settings-row label {
      font-size: 0.88rem;
      color: var(--muted);
      white-space: nowrap;
    }

    select {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
    }

    .btn-primary {
      display: inline-block;
      padding: 11px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      display: inline-block;
      padding: 10px 20px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
      margin: 4px;
    }

    .btn-ghost:hover { background: var(--bg); }

    /* ── Quiz Screen ── */
    .progress-bar {
      height: 5px;
      background: var(--bg);
      border-radius: 3px;
      margin-bottom: 1.4rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .category-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 3px 10px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 999px;
      margin-bottom: 0.9rem;
    }

    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
      font-weight: 500;
      line-height: 1.55;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.4rem;
    }

    @media (max-width: 480px) {
      .options { grid-template-columns: 1fr; }
    }

    .opt-btn {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }

    .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
    .opt-btn.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); }
    .opt-btn.wrong   { background: var(--wrong-bg);   border-color: var(--wrong-border);   color: var(--wrong-text); }
    .opt-btn:disabled { cursor: default; }

    .feedback {
      font-size: 0.88rem;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      margin-bottom: 1rem;
    }

    .feedback.correct { background: var(--correct-bg); color: var(--correct-text); }
    .feedback.wrong   { background: var(--wrong-bg);   color: var(--wrong-text); }

    /* ── Score Screen ── */
    #score-screen { text-align: center; }

    .score-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--accent-light);
      border: 3px solid var(--accent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
    }

    .score-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
    }

    .score-pct {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    #score-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      margin-bottom: 0.4rem;
    }

    #score-screen p {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <span class="flag">🇫🇷</span>
    <h1>French Essentials Quiz</h1>
    <p>500 questions · Lessons 1–20 · Learn French With Alexa</p>
  </header>

  <div class="card">

    <!-- Start Screen -->
    <div id="start-screen">
      <h2>Choose your session</h2>
      <p>Filter by topic and pick how many questions to answer.</p>

      <div class="filter-label">Topics</div>
      <div class="filter-bar" id="filter-bar"></div>

      <div class="settings-row">
        <label for="q-count">Questions:</label>
        <select id="q-count">
          <option value="20">20</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="500">All 500</option>
        </select>
      </div>

      <button class="btn-primary" onclick="startQuiz()">Start quiz →</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <div class="meta">
        <span id="q-counter"></span>
        <span id="score-track"></span>
      </div>
      <div class="category-badge" id="cat-badge"></div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback" style="display:none"></div>
      <button class="btn-primary" id="next-btn" style="display:none" onclick="nextQ()">Next →</button>
    </div>

    <!-- Score Screen -->
    <div id="score-screen" style="display:none">
      <div class="score-ring">
        <div class="score-num" id="final-fraction"></div>
        <div class="score-pct" id="final-pct"></div>
      </div>
      <h2 id="score-msg"></h2>
      <p id="score-sub"></p>
      <button class="btn-ghost" onclick="restartSame()">Try again</button>
      <button class="btn-ghost" onclick="showStart()">Change settings</button>
    </div>

  </div>

  <footer>Built with ❤️ — French Essentials · Lessons 1–20</footer>

    const CATS = [...new Set(ALL.map(q => q.c))];
    let activeFilters = new Set(CATS);
    let currentSet = [], idx = 0, score = 0, answered = false;

    function buildFilters() {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active';
      allBtn.id = 'filter-all';
      allBtn.textContent = 'All topics';
      allBtn.onclick = () => { activeFilters = new Set(CATS); updateFilters(); };
      bar.appendChild(allBtn);
      CATS.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn active';
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.onclick = () => {
          if (activeFilters.has(cat)) { if (activeFilters.size > 1) activeFilters.delete(cat); }
          else activeFilters.add(cat);
          updateFilters();
        };
        bar.appendChild(btn);
      });
    }

    function updateFilters() {
      const allActive = activeFilters.size === CATS.length;
      document.getElementById('filter-all').className = 'filter-btn' + (allActive ? ' active' : '');
      CATS.forEach(cat => {
        const btn = document.querySelector(`[data-cat="${cat}"]`);
        if (btn) btn.className = 'filter-btn' + (activeFilters.has(cat) ? ' active' : '');
      });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuiz() {
      const count = parseInt(document.getElementById('q-count').value);
      const pool = shuffle(ALL.filter(q => activeFilters.has(q.c)));
      currentSet = pool.slice(0, Math.min(count, pool.length));
      idx = 0; score = 0;
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('score-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'block';
      showQ();
    }

    function showQ() {
      answered = false;
      const q = currentSet[idx];
      const total = currentSet.length;
      document.getElementById('prog').style.width = (idx / total * 100) + '%';
      document.getElementById('q-counter').textContent = `Question ${idx + 1} of ${total}`;
      document.getElementById('score-track').textContent = `Score: ${score}/${idx}`;
      document.getElementById('cat-badge').textContent = q.c;
      document.getElementById('q-text').textContent = q.q;
      document.getElementById('feedback').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      const opts = shuffle([q.a, ...q.w]);
      const container = document.getElementById('options');
      container.innerHTML = '';
      opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(opt, q.a, btn);
        container.appendChild(btn);
      });
    }

    function selectAnswer(chosen, correct, btn) {
      if (answered) return;
      answered = true;
      document.querySelectorAll('.opt-btn').forEach(b => {
        b.disabled = true;
        if (b.textContent === correct) b.classList.add('correct');
      });
      const fb = document.getElementById('feedback');
      if (chosen === correct) {
        score++;
        btn.classList.add('correct');
        fb.className = 'feedback correct';
        fb.textContent = '✓ Correct!';
      } else {
        btn.classList.add('wrong');
        fb.className = 'feedback wrong';
        fb.textContent = `✗ The correct answer is: ${correct}`;
      }
      fb.style.display = 'block';
      document.getElementById('next-btn').style.display = 'inline-block';
      document.getElementById('score-track').textContent = `Score: ${score}/${idx + 1}`;
    }

    function nextQ() {
      idx++;
      if (idx >= currentSet.length) { showScore(); return; }
      showQ();
    }

    function showScore() {
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('score-screen').style.display = 'block';
      const pct = Math.round(score / currentSet.length * 100);
      document.getElementById('final-fraction').textContent = `${score}/${currentSet.length}`;
      document.getElementById('final-pct').textContent = `${pct}%`;
      const msgs = [
        [80, "Excellent work! 🎉", "You have a strong grasp of these topics. Keep it up!"],
        [60, "Good effort! 👍", "You're making progress — review the tricky ones and try again."],
        [0,  "Keep studying! 📚", "French takes practice. Review your lessons and come back."],
      ];
      const [, h, s] = msgs.find(([min]) => pct >= min);
      document.getElementById('score-msg').textContent = h;
      document.getElementById('score-sub').textContent = s;
      document.getElementById('prog').style.width = '100%';
    }

    function restartSame() { startQuiz(); }
    function showStart() {
      document.getElementById('score-screen').style.display = 'none';
      document.getElementById('quiz-screen').style.display = 'none';
      document.getElementById('start-screen').style.display = 'block';
    }

    buildFilters();
  </script>
</body>
</html>
